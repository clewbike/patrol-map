name: Deploy GitHub Pages

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://clewbike.github.io/patrol-map/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html manifest.json robots.txt data.json error.json _site/
          cp -R icons src docs _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 1
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy to GitHub Pages
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 2
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 120

      - name: Final deploy to GitHub Pages
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5
